<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>เกมจำนวนเต็ม AR — บวก ลบ และศูนย์ (ม.1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1026;
    --neg:#38BDF8;      /* จำนวนเต็มลบ - ฟ้า */
    --pos:#FBBF24;      /* จำนวนเต็มบวก - เหลือง */
    --zero:#E5E7EB;     /* ศูนย์ - ขาว */
    --ok:#A3E635;       /* ตอบถูก - เขียวมะนาว */
    --bad:#F87171;      /* ตอบผิด - แดง */
    --ink:#F8FAFC;
    --panel:rgba(11,16,38,.62);
    --panel-edge:rgba(148,163,184,.28);
    --disp:'Chakra Petch',system-ui,sans-serif;
    --body:'IBM Plex Sans Thai',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:var(--body);}
  #cam{
    position:fixed;inset:0;width:100%;height:100%;
    object-fit:cover;transform:scaleX(-1);
    filter:saturate(.85) brightness(.55);
  }
  #overlay{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;}
  .veil{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 0%,rgba(11,16,38,.15),rgba(11,16,38,.78));}

  /* ---------- HUD ---------- */
  #hud{
    position:fixed;top:0;left:0;right:0;z-index:5;
    display:flex;justify-content:space-between;align-items:center;
    padding:clamp(14px,2.2vw,26px) clamp(18px,3vw,40px);
    font-family:var(--disp);pointer-events:none;
  }
  .chip{
    background:var(--panel);border:1px solid var(--panel-edge);
    border-radius:16px;padding:.5em .95em;backdrop-filter:blur(6px);
    display:flex;align-items:baseline;gap:.5em;
    font-size:clamp(16px,2.4vw,30px);font-weight:600;letter-spacing:.02em;
  }
  .chip .lab{font-family:var(--body);font-size:.62em;font-weight:500;color:#9fb0c9;letter-spacing:.06em;}
  .chip .big{font-size:1.15em;color:var(--pos);}

  /* ---------- screens ---------- */
  .screen{position:fixed;inset:0;z-index:6;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:5vw;gap:clamp(18px,3vh,34px);}
  .hidden{display:none!important;}

  .title{font-family:var(--disp);font-weight:700;line-height:1.02;
    font-size:clamp(34px,7vw,86px);letter-spacing:.01em;}
  .title .a{color:var(--neg);}
  .title .b{color:var(--zero);}
  .title .c{color:var(--pos);}
  .sub{font-size:clamp(16px,2.5vw,24px);color:#c3cfe2;max-width:22ch;line-height:1.5;font-weight:500;}

  .btn{
    font-family:var(--disp);font-weight:700;cursor:pointer;
    font-size:clamp(20px,3vw,30px);letter-spacing:.04em;
    color:#07110a;background:var(--ok);border:none;
    padding:.7em 1.6em;border-radius:999px;
    box-shadow:0 10px 34px rgba(163,230,53,.35);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 14px 40px rgba(163,230,53,.5);}
  .btn:active{transform:translateY(0);}
  .btn.ghost{background:transparent;color:var(--ink);border:2px solid var(--panel-edge);box-shadow:none;}

  .howto{display:flex;flex-direction:column;gap:.7em;font-size:clamp(15px,2.2vw,20px);
    color:#d4deec;background:var(--panel);border:1px solid var(--panel-edge);
    border-radius:20px;padding:1.2em 1.5em;backdrop-filter:blur(6px);max-width:30ch;text-align:left;}
  .howto b{color:var(--pos);}

  /* number-line signature */
  .numline{width:min(92vw,760px);height:64px;position:relative;margin-top:.4em;}
  .numline svg{width:100%;height:100%;overflow:visible;}

  /* ---------- game ---------- */
  #game{position:fixed;inset:0;z-index:4;display:flex;flex-direction:column;
    align-items:center;pointer-events:none;padding-top:clamp(74px,11vh,120px);}
  .qcard{
    background:var(--panel);border:1px solid var(--panel-edge);backdrop-filter:blur(8px);
    border-radius:24px;padding:clamp(14px,2.4vh,26px) clamp(24px,5vw,60px);
    display:flex;flex-direction:column;align-items:center;gap:.35em;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
  }
  .qlabel{font-family:var(--body);font-weight:600;color:#93a4bd;
    font-size:clamp(13px,2vw,18px);letter-spacing:.14em;text-transform:uppercase;}
  .qtext{font-family:var(--disp);font-weight:700;line-height:1;
    font-size:clamp(40px,9vw,104px);letter-spacing:.01em;}
  .qtext .eq{color:#6b7a94;margin:0 .18em;}
  .qtext .qm{color:var(--ok);}

  #answers{
    position:absolute;inset:0;top:0;pointer-events:none;
  }
  .ans{
    position:absolute;transform:translate(-50%,-50%);
    min-width:clamp(120px,17vw,220px);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--disp);font-weight:700;
    font-size:clamp(34px,6.2vw,72px);line-height:1;
    padding:.42em .3em;border-radius:22px;
    background:rgba(17,24,52,.72);border:3px solid var(--panel-edge);
    backdrop-filter:blur(4px);color:var(--ink);
    box-shadow:0 12px 34px rgba(0,0,0,.4);
    transition:transform .15s ease, border-color .2s ease, background .2s ease;
  }
  .ans.neg{color:var(--neg);}
  .ans.pos{color:var(--pos);}
  .ans.zero{color:var(--zero);}
  .ans.hot{border-color:var(--ok);transform:translate(-50%,-50%) scale(1.06);
    box-shadow:0 0 0 4px rgba(163,230,53,.25),0 16px 40px rgba(0,0,0,.5);}
  .ans.correct{border-color:var(--ok);background:rgba(163,230,53,.9);color:#07110a;
    transform:translate(-50%,-50%) scale(1.12);}
  .ans.wrong{border-color:var(--bad);background:rgba(248,113,113,.85);color:#2a0606;}

  .toast{
    position:fixed;left:50%;bottom:6vh;transform:translateX(-50%) translateY(20px);
    z-index:7;opacity:0;pointer-events:none;
    font-family:var(--disp);font-weight:700;font-size:clamp(22px,4vw,40px);
    padding:.5em 1.3em;border-radius:999px;transition:opacity .25s ease, transform .25s ease;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast.good{background:var(--ok);color:#07110a;}
  .toast.miss{background:var(--bad);color:#2a0606;}

  .hint{
    position:fixed;bottom:3vh;left:50%;transform:translateX(-50%);z-index:5;
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;
    padding:.55em 1.3em;font-size:clamp(14px,2vw,18px);color:#cbd6e8;
    backdrop-filter:blur(6px);display:flex;align-items:center;gap:.6em;
    opacity:0;transition:opacity .3s ease;pointer-events:none;
  }
  .hint.show{opacity:1;}
  .hint .dot{width:.7em;height:.7em;border-radius:50%;background:var(--bad);
    box-shadow:0 0 12px var(--bad);animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.35;}}

  /* result */
  .scorebig{font-family:var(--disp);font-weight:700;
    font-size:clamp(60px,14vw,180px);line-height:1;color:var(--ok);}
  .scorebig .tot{color:#6b7a94;font-size:.5em;}
  .medal{font-size:clamp(40px,9vw,96px);}

  @media (max-width:560px){
    .ans{min-width:104px;}
  }
</style>
</head>
<body>
  <video id="cam" playsinline autoplay muted></video>
  <div class="veil"></div>
  <canvas id="overlay"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="chip"><span class="lab">ข้อ</span><span id="qnum" class="big">1</span><span style="color:#6b7a94">/10</span></div>
    <div class="chip"><span class="lab">คะแนน</span><span id="score" class="big">0</span></div>
  </div>

  <!-- START -->
  <div id="start" class="screen">
    <div class="title"><span class="a">จำนวนเต็ม</span> <span class="b">AR</span></div>
    <div class="sub">บวก · ลบ · และศูนย์ — ยกมือชี้คำตอบด้วยกล้อง สำหรับชั้น ม.1</div>

    <div class="numline">
      <svg viewBox="0 0 760 64" preserveAspectRatio="none" aria-hidden="true">
        <defs>
          <linearGradient id="nl" x1="0" x2="1">
            <stop offset="0" stop-color="#38BDF8"/><stop offset=".5" stop-color="#E5E7EB"/><stop offset="1" stop-color="#FBBF24"/>
          </linearGradient>
        </defs>
        <line x1="20" y1="40" x2="740" y2="40" stroke="url(#nl)" stroke-width="4"/>
        <g font-family="Chakra Petch" font-weight="700" font-size="20" text-anchor="middle">
          <g stroke="url(#nl)" stroke-width="3">
            <line x1="100" y1="30" x2="100" y2="50"/><line x1="220" y1="30" x2="220" y2="50"/>
            <line x1="380" y1="26" x2="380" y2="54"/><line x1="540" y1="30" x2="540" y2="50"/>
            <line x1="660" y1="30" x2="660" y2="50"/>
          </g>
          <text x="100" y="22" fill="#38BDF8">-2</text><text x="220" y="22" fill="#38BDF8">-1</text>
          <text x="380" y="18" fill="#E5E7EB">0</text>
          <text x="540" y="22" fill="#FBBF24">1</text><text x="660" y="22" fill="#FBBF24">2</text>
        </g>
      </svg>
    </div>

    <div class="howto">
      <div>1. อนุญาตให้เว็บใช้ <b>กล้อง</b></div>
      <div>2. ยก<b>มือ</b>ขึ้นให้กล้องเห็น จะมีวงกลมตามปลายนิ้ว</div>
      <div>3. เลื่อนมือไปทับ<b>กล่องคำตอบ</b> แล้ว<b>ค้างไว้</b>จนวงเต็ม</div>
    </div>
    <button id="startBtn" class="btn">เริ่มเล่น</button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="qcard">
      <div class="qlabel">หาคำตอบ</div>
      <div id="qtext" class="qtext"></div>
    </div>
    <div id="answers"></div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="hint" class="hint"><span class="dot"></span><span>ยกมือขึ้นให้กล้องเห็น</span></div>

  <!-- RESULT -->
  <div id="result" class="screen hidden">
    <div id="medal" class="medal"></div>
    <div class="title" style="font-size:clamp(28px,5vw,52px)">สรุปคะแนน</div>
    <div class="scorebig"><span id="finalScore">0</span><span class="tot">/10</span></div>
    <div id="verdict" class="sub"></div>
    <button id="againBtn" class="btn">เล่นอีกครั้ง</button>
  </div>

<!-- MediaPipe via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
<script>
/* ============ ข้อมูลโจทย์ ============ */
const QUESTIONS = [
  { q:"(−5) + 8",       answer:3,   choices:[3,-3,13,-13] },
  { q:"7 + (−12)",      answer:-5,  choices:[-5,5,19,-19] },
  { q:"(−4) + (−6)",    answer:-10, choices:[-10,10,-2,2] },
  { q:"0 + (−9)",       answer:-9,  choices:[-9,9,0] },
  { q:"15 − 20",        answer:-5,  choices:[-5,5,-35,35] },
  { q:"(−3) − 7",       answer:-10, choices:[-10,4,-4,10] },
  { q:"10 − (−5)",      answer:15,  choices:[15,5,-15,-5] },
  { q:"(−8) − (−3)",    answer:-5,  choices:[-5,-11,5,11] },
  { q:"(−6) + 6",       answer:0,   choices:[0,-12,12] },
  { q:"4 − 9 + (−2)",   answer:-7,  choices:[-7,-3,7,-11] },
];
const HOLD_MS = 1800;      // เวลาค้างมือเพื่อยืนยัน
const CURSOR_R = 26;       // รัศมีเคอร์เซอร์ (px)

/* ============ องค์ประกอบ DOM ============ */
const video   = document.getElementById('cam');
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');
const hud     = document.getElementById('hud');
const qnumEl  = document.getElementById('qnum');
const scoreEl = document.getElementById('score');
const startScreen = document.getElementById('start');
const gameScreen  = document.getElementById('game');
const resultScreen= document.getElementById('result');
const qtextEl = document.getElementById('qtext');
const answersEl = document.getElementById('answers');
const toastEl = document.getElementById('toast');
const hintEl  = document.getElementById('hint');

/* ============ สถานะเกม ============ */
let idx = 0, score = 0;
let playing = false, locked = false;   // locked = ระหว่างแสดงผลถูก/ผิด
let fingerXY = null;                    // {x,y} พิกัดปลายนิ้ว (px บนจอ)
let handSeen = false;
let hoverEl = null, holdStart = 0, holdProg = 0;
let lastHintFlip = 0;

/* ============ เสียง (Web Audio, ไม่ต้องมีไฟล์) ============ */
let audioCtx = null;
function beep(freqs, dur=0.12, type='sine'){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    freqs.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type=type; o.frequency.value=f;
      o.connect(g); g.connect(audioCtx.destination);
      const s=t+i*dur;
      g.gain.setValueAtTime(0,s);
      g.gain.linearRampToValueAtTime(.25,s+0.015);
      g.gain.exponentialRampToValueAtTime(.0001,s+dur);
      o.start(s); o.stop(s+dur);
    });
  }catch(e){}
}
const sndCorrect = ()=>beep([523,659,784],0.13,'triangle'); // โด-มี-ซอล
const sndWrong   = ()=>beep([196,155],0.18,'sawtooth');
const sndConfirm = ()=>beep([440],0.06,'sine');

/* ============ ปรับขนาด canvas ============ */
function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  overlay.width  = window.innerWidth * dpr;
  overlay.height = window.innerHeight * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resize);
resize();

/* ============ ตำแหน่งกล่องคำตอบ (เป็น % ของจอ) ============ */
// จัดวางให้กระจายในย่านกลาง-ล่าง เอื้อมมือถึง
const LAYOUTS = {
  2:[[30,58],[70,58]],
  3:[[22,55],[50,72],[78,55]],
  4:[[22,50],[78,50],[30,74],[70,74]],
};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmt(n){ return n<0 ? '−'+Math.abs(n) : ''+n; } // ใช้เครื่องหมายลบสวย

function renderQuestion(){
  const cur = QUESTIONS[idx];
  qnumEl.textContent = idx+1;
  scoreEl.textContent = score;
  // แสดงโจทย์ + " = ?"
  qtextEl.innerHTML = cur.q.replace(/−/g,'<span style="color:#38BDF8">−</span>')
    + ' <span class="eq">=</span> <span class="qm">?</span>';

  answersEl.innerHTML='';
  const opts = shuffle(cur.choices);
  const pos = LAYOUTS[opts.length] || LAYOUTS[4];
  opts.forEach((val,i)=>{
    const el=document.createElement('div');
    el.className='ans '+(val<0?'neg':val>0?'pos':'zero');
    el.textContent=fmt(val);
    el.dataset.val=val;
    el.style.left=pos[i][0]+'%';
    el.style.top =pos[i][1]+'%';
    answersEl.appendChild(el);
  });
  hoverEl=null; holdStart=0; holdProg=0; locked=false;
}

/* ============ ตรวจว่านิ้วทับกล่องไหน ============ */
function boxUnderFinger(){
  if(!fingerXY) return null;
  const boxes=answersEl.querySelectorAll('.ans');
  for(const b of boxes){
    const r=b.getBoundingClientRect();
    if(fingerXY.x>=r.left&&fingerXY.x<=r.right&&fingerXY.y>=r.top&&fingerXY.y<=r.bottom)
      return b;
  }
  return null;
}

/* ============ ลูปเกม (เรียกทุกเฟรมจาก onResults) ============ */
let lastT = performance.now();
function tick(){
  const now=performance.now();
  const dt=now-lastT; lastT=now;

  // hint เมื่อไม่เห็นมือ
  if(playing && !locked){
    if(!handSeen){ hintEl.classList.add('show'); }
    else{ hintEl.classList.remove('show'); }
  }

  if(playing && !locked && handSeen){
    const b=boxUnderFinger();
    // เคลียร์ hot จากกล่องเดิม
    if(hoverEl && hoverEl!==b){ hoverEl.classList.remove('hot'); }
    if(b){
      if(b!==hoverEl){ hoverEl=b; holdStart=now; holdProg=0; b.classList.add('hot'); }
      else{
        holdProg=Math.min(1,(now-holdStart)/HOLD_MS);
        if(holdProg>=1){ commitAnswer(b); }
      }
    }else{
      hoverEl=null; holdProg=0;
    }
  }
}

/* ============ ยืนยันคำตอบ ============ */
function commitAnswer(box){
  locked=true;
  sndConfirm();
  const chosen=parseInt(box.dataset.val,10);
  const correct=QUESTIONS[idx].answer;
  box.classList.remove('hot');
  if(chosen===correct){
    score++; scoreEl.textContent=score;
    box.classList.add('correct');
    sndCorrect(); showToast('ถูกต้อง! 🎉','good');
  }else{
    box.classList.add('wrong');
    // ไฮไลต์คำตอบที่ถูก
    answersEl.querySelectorAll('.ans').forEach(el=>{
      if(parseInt(el.dataset.val,10)===correct) el.classList.add('correct');
    });
    sndWrong(); showToast('คำตอบคือ '+fmt(correct),'miss');
  }
  hoverEl=null; holdProg=0;
  setTimeout(()=>{
    idx++;
    if(idx>=QUESTIONS.length) endGame();
    else renderQuestion();
  },1600);
}

function showToast(msg,kind){
  toastEl.textContent=msg;
  toastEl.className='toast show '+(kind==='good'?'good':'miss');
  setTimeout(()=>toastEl.classList.remove('show'),1500);
}

/* ============ เริ่ม / จบ ============ */
function startGame(){
  if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
  idx=0; score=0; playing=true; locked=false;
  startScreen.classList.add('hidden');
  resultScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  hud.classList.remove('hidden');
  renderQuestion();
}
function endGame(){
  playing=false;
  gameScreen.classList.add('hidden');
  hud.classList.add('hidden');
  hintEl.classList.remove('show');
  document.getElementById('finalScore').textContent=score;
  const pct=score/QUESTIONS.length;
  const medal=document.getElementById('medal');
  const verdict=document.getElementById('verdict');
  if(pct>=0.9){medal.textContent='🏆';verdict.textContent='ยอดเยี่ยมมาก! เชี่ยวชาญเรื่องจำนวนเต็มแล้ว';}
  else if(pct>=0.6){medal.textContent='🥈';verdict.textContent='เก่งมาก! ทบทวนอีกนิดจะเต็มแน่นอน';}
  else{medal.textContent='🎯';verdict.textContent='พยายามต่อไป ลองทบทวนเรื่องเครื่องหมายบวกลบอีกครั้ง';}
  resultScreen.classList.remove('hidden');
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('againBtn').addEventListener('click',startGame);

/* ============ MediaPipe Hands ============ */
const hands=new Hands({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
hands.onResults(onResults);

function onResults(res){
  const vw=window.innerWidth, vh=window.innerHeight;
  ctx.clearRect(0,0,vw,vh);

  if(res.multiHandLandmarks && res.multiHandLandmarks.length){
    handSeen=true;
    const lm=res.multiHandLandmarks[0];
    const tip=lm[8];                 // ปลายนิ้วชี้
    // กล้อง mirror → สลับแกน x
    const x=(1-tip.x)*vw, y=tip.y*vh;
    fingerXY={x,y};

    // เส้นโครงมือแบบจาง
    ctx.strokeStyle='rgba(163,230,53,.35)';ctx.lineWidth=3;
    const bones=[[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[0,17],[5,9],[9,13],[13,17]];
    ctx.beginPath();
    bones.forEach(([a,b])=>{
      ctx.moveTo((1-lm[a].x)*vw,lm[a].y*vh);
      ctx.lineTo((1-lm[b].x)*vw,lm[b].y*vh);
    });
    ctx.stroke();

    drawCursor(x,y);
  }else{
    handSeen=false; fingerXY=null;
  }
  tick();
}

function drawCursor(x,y){
  // วงแหวนความคืบหน้าการค้างมือ
  ctx.save();
  ctx.translate(x,y);
  // เงา
  ctx.beginPath();ctx.arc(0,0,CURSOR_R+6,0,Math.PI*2);
  ctx.fillStyle='rgba(11,16,38,.5)';ctx.fill();
  // ขอบ
  ctx.beginPath();ctx.arc(0,0,CURSOR_R,0,Math.PI*2);
  ctx.strokeStyle='rgba(248,250,252,.9)';ctx.lineWidth=4;ctx.stroke();
  // จุดกลาง
  ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fillStyle= hoverEl?'#A3E635':'#F8FAFC';ctx.fill();
  // progress arc
  if(holdProg>0){
    ctx.beginPath();
    ctx.arc(0,0,CURSOR_R+6,-Math.PI/2,-Math.PI/2+holdProg*Math.PI*2);
    ctx.strokeStyle='#A3E635';ctx.lineWidth=6;ctx.lineCap='round';ctx.stroke();
  }
  ctx.restore();
}

/* ============ กล้อง ============ */
const camera=new Camera(video,{
  onFrame:async()=>{ await hands.send({image:video}); },
  width:640,height:480
});
camera.start().catch(err=>{
  hintEl.querySelector('span:last-child').textContent='เปิดกล้องไม่สำเร็จ — ตรวจสอบสิทธิ์กล้องและใช้ผ่าน https';
  hintEl.classList.add('show');
  console.error(err);
});
</script>
