<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Math AR - Integer Operations</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            transform: scaleX(-1);
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .screen {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #0ff;
            box-shadow: 0 0 20px #0ff;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            pointer-events: auto;
            backdrop-filter: blur(5px);
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #f0f;
            text-shadow: 0 0 10px #f0f;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            color: #0ff;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Kanit', sans-serif;
            font-weight: bold;
            color: #000;
            background: #0ff;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px #0ff;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        button:hover {
            background: #f0f;
            box-shadow: 0 0 25px #f0f;
            color: #fff;
        }
        #loading {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #0ff;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <video id="input_video" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="loading">SYSTEM INITIALIZING... PLEASE WAIT</div>
        
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1>CYBER MATH AR</h1>
                <p>การบวกและลบจำนวนเต็ม (20 ข้อ)</p>
                <p style="font-size: 1.2rem; margin-top: 10px;">กติกา: ใช้มือชี้ที่คำตอบค้างไว้ 0.3 วินาที<br>ให้เวลาคิดข้อละ 2 นาที</p>
                <button onclick="startGame()">INITIALIZE START</button>
            </div>

            <div id="end-screen" class="screen" style="display: none;">
                <h1>SYSTEM TERMINATED</h1>
                <p id="final-score" style="font-size: 2.5rem; color: #0ff;">SCORE: 0 / 20</p>
                <button onclick="resetGame()">REBOOT SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingText = document.getElementById('loading');
        
        let gameState = 'START';
        let currentQuestion = 0;
        let score = 0;
        let handX = 0, handY = 0;
        let isHandDetected = false;
        
        let hoverStartTime = null;
        const HOVER_TIME_MS = 300; 
        let hoveredBox = null;

        let questionStartTime = null;
        const TIME_LIMIT_MS = 120000; 
        let showingFeedback = false;
        let feedbackTimer = null;
        let correctAnswerIndex = -1;
        let timeExpired = false;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong' || type === 'timeout') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hover') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        const questions = [
            { q: "5 + 4", ans: 9, wrong: 1 },
            { q: "(-3) + 7", ans: 4, wrong: -4 },
            { q: "8 - 10", ans: -2, wrong: 2 },
            { q: "(-5) + (-2)", ans: -7, wrong: -3 },
            { q: "0 - 6", ans: -6, wrong: 0 },
            { q: "12 + (-4)", ans: 8, wrong: -8 },
            { q: "(-9) - (-3)", ans: -6, wrong: -12 },
            { q: "7 - (-2)", ans: 9, wrong: 5 },
            { q: "(-1) + 1", ans: 0, wrong: 2 },
            { q: "(-8) + 5", ans: -3, wrong: -13 },
            { q: "10 - 15", ans: -5, wrong: 5 },
            { q: "(-4) - 4", ans: -8, wrong: 0 },
            { q: "6 + (-9)", ans: -3, wrong: 3 },
            { q: "(-2) - (-7)", ans: 5, wrong: -9 },
            { q: "3 - (-3)", ans: 6, wrong: 0 },
            { q: "(-7) + 2", ans: -5, wrong: -9 },
            { q: "11 + (-11)", ans: 0, wrong: 22 },
            { q: "(-5) - 5", ans: -10, wrong: 0 },
            { q: "8 + (-3)", ans: 5, wrong: 11 },
            { q: "(-10) + 4", ans: -6, wrong: -14 }
        ];

        let currentChoices = [];
        let boxes = []; 

        function generateChoices() {
            const q = questions[currentQuestion];
            if (Math.random() > 0.5) {
                currentChoices = [q.ans, q.wrong];
                correctAnswerIndex = 0;
            } else {
                currentChoices = [q.wrong, q.ans];
                correctAnswerIndex = 1;
            }
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            gameState = 'PLAYING';
            currentQuestion = 0;
            score = 0;
            generateChoices();
            questionStartTime = Date.now();
        }

        function resetGame() {
            startGame();
        }

        function handleAnswer(selectedIndex) {
            if (showingFeedback) return;
            
            showingFeedback = true;
            hoverStartTime = null;

            if (selectedIndex === correctAnswerIndex) {
                score++;
                playSound('correct');
            } else {
                playSound('wrong');
            }

            feedbackTimer = setTimeout(() => {
                nextQuestion();
            }, 1500);
        }

        function handleTimeout() {
            if (showingFeedback) return;
            showingFeedback = true;
            hoverStartTime = null;
            timeExpired = true;
            playSound('timeout');

            feedbackTimer = setTimeout(() => {
                nextQuestion();
            }, 2500);
        }

        function nextQuestion() {
            showingFeedback = false;
            timeExpired = false;
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                gameState = 'RESULT';
                document.getElementById('end-screen').style.display = 'block';
                document.getElementById('final-score').innerText = `SCORE: ${score} / 20`;
            } else {
                generateChoices();
                questionStartTime = Date.now();
            }
        }

        function formatTime(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function onResults(results) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.image) {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            }

            canvasCtx.fillStyle = 'rgba(0, 10, 20, 0.6)';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            isHandDetected = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true;
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                
                handX = indexTip.x * canvasElement.width;
                handY = indexTip.y * canvasElement.height;

                canvasCtx.beginPath();
                canvasCtx.arc(handX, handY, 15, 0, 2 * Math.PI);
                canvasCtx.fillStyle = '#0ff';
                canvasCtx.shadowBlur = 20;
                canvasCtx.shadowColor = '#0ff';
                canvasCtx.fill();
                
                canvasCtx.beginPath();
                canvasCtx.arc(handX, handY, 25, 0, 2 * Math.PI);
                canvasCtx.strokeStyle = '#f0f';
                canvasCtx.lineWidth = 3;
                canvasCtx.stroke();
            }
            canvasCtx.shadowBlur = 0; 

            if (gameState === 'PLAYING') {
                const cw = canvasElement.width;
                const ch = canvasElement.height;

                let timeLeft = TIME_LIMIT_MS - (Date.now() - questionStartTime);
                if (timeLeft <= 0 && !showingFeedback) {
                    timeLeft = 0;
                    handleTimeout();
                }

                canvasCtx.save();
                canvasCtx.scale(-1, 1);
                canvasCtx.translate(-cw, 0);
                
                const screenHandX = cw - handX;
                const screenHandY = handY; 

                // --- Header ---
                canvasCtx.shadowBlur = 10;
                canvasCtx.shadowColor = '#0ff';
                canvasCtx.fillStyle = '#0ff';
                canvasCtx.font = 'bold 40px Orbitron';
                canvasCtx.textAlign = 'center';
                
                canvasCtx.fillText(`STAGE: ${currentQuestion + 1} / 20`, cw / 2 - 250, 60);
                canvasCtx.fillText(`SCORE: ${score}`, cw / 2 + 250, 60);

                if (timeLeft < 10000) {
                    canvasCtx.fillStyle = '#f0f'; 
                    canvasCtx.shadowColor = '#f0f';
                }
                canvasCtx.fillText(`TIME: ${formatTime(timeLeft)}`, cw / 2, ch / 2 + 30);

                // --- Question (ขนาดมหึมา 280px) ---
                canvasCtx.fillStyle = '#fff';
                canvasCtx.font = 'bold 280px Orbitron';
                canvasCtx.shadowColor = '#0ff';
                canvasCtx.textBaseline = 'middle';
                canvasCtx.fillText(questions[currentQuestion].q, cw / 2, ch * 0.28); 

                // --- Answer Boxes (ขนาดมหึมา) ---
                const boxW = cw * 0.38; 
                const boxH = ch * 0.35; 
                const gap = cw * 0.08;
                const boxY = ch - boxH - 40; 
                
                boxes = [
                    { x: cw/2 - gap/2 - boxW, y: boxY, w: boxW, h: boxH, ans: currentChoices[0] },
                    { x: cw/2 + gap/2, y: boxY, w: boxW, h: boxH, ans: currentChoices[1] }
                ];

                let currentHover = -1;

                boxes.forEach((box, index) => {
                    const isHovered = isHandDetected && !showingFeedback &&
                                      screenHandX >= box.x && screenHandX <= box.x + box.w &&
                                      screenHandY >= box.y && screenHandY <= box.y + box.h;
                    
                    if (isHovered) {
                        currentHover = index;
                    }

                    let strokeCol = '#0ff';
                    let fillCol = 'rgba(0, 255, 255, 0.1)';
                    let textCol = '#fff';

                    if (showingFeedback) {
                        if (index === correctAnswerIndex) {
                            strokeCol = '#0f0'; 
                            fillCol = 'rgba(0, 255, 0, 0.4)';
                            textCol = '#0f0';
                        } else if (timeExpired) {
                            strokeCol = '#444'; 
                            fillCol = 'rgba(0,0,0,0.5)';
                        } else if (index !== correctAnswerIndex) {
                            strokeCol = '#f00'; 
                            fillCol = 'rgba(255, 0, 0, 0.4)';
                            textCol = '#f00';
                        }
                    } else if (isHovered) {
                        strokeCol = '#f0f';
                        fillCol = 'rgba(255, 0, 255, 0.3)';
                        textCol = '#f0f';
                    }

                    // Draw Rect
                    canvasCtx.beginPath();
                    canvasCtx.rect(box.x, box.y, box.w, box.h);
                    canvasCtx.fillStyle = fillCol;
                    canvasCtx.fill();
                    canvasCtx.lineWidth = 6;
                    canvasCtx.strokeStyle = strokeCol;
                    canvasCtx.shadowBlur = 20;
                    canvasCtx.shadowColor = strokeCol;
                    canvasCtx.stroke();

                    // Draw Text (คำตอบขนาดยักษ์ 320px)
                    canvasCtx.fillStyle = textCol;
                    canvasCtx.font = 'bold 320px Kanit';
                    canvasCtx.textAlign = 'center';
                    canvasCtx.textBaseline = 'middle';
                    canvasCtx.fillText(box.ans, box.x + box.w/2, box.y + box.h/2 + 20); 
                });

                if (currentHover !== -1 && !showingFeedback) {
                    if (hoveredBox !== currentHover) {
                        hoveredBox = currentHover;
                        hoverStartTime = Date.now();
                        playSound('hover');
                    } else {
                        const elapsed = Date.now() - hoverStartTime;
                        const progress = Math.min(elapsed / HOVER_TIME_MS, 1);
                        
                        const box = boxes[currentHover];
                        canvasCtx.fillStyle = '#f0f';
                        canvasCtx.shadowBlur = 10;
                        canvasCtx.shadowColor = '#f0f';
                        canvasCtx.fillRect(box.x, box.y + box.h - 20, box.w * progress, 20); 

                        if (progress >= 1) {
                            handleAnswer(currentHover);
                        }
                    }
                } else {
                    hoveredBox = null;
                    hoverStartTime = null;
                }

                if (timeExpired) {
                    canvasCtx.fillStyle = '#f00';
                    canvasCtx.font = 'bold 100px Orbitron';
                    canvasCtx.shadowColor = '#f00';
                    canvasCtx.fillText("TIME EXPIRED", cw / 2, ch / 2 - 50);
                }

                canvasCtx.restore();
            }
            
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            loadingText.style.display = 'none';
        }).catch(err => {
            loadingText.innerText = 'CAMERA ERROR. PLEASE ALLOW ACCESS.';
        });
    </script>
</body>
</html>
